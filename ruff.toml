line-length = 100
target-version = "py311"
extend-exclude = ["**/data/code_repos/**"]

[lint]
select = [
  "E", "F", "W",   # pycodestyle / pyflakes
  "I",             # isort
  "B",             # bugbear
  "UP",            # pyupgrade
  "ASYNC",         # async best practices
  "SIM",           # simplify
  "RUF",           # ruff-specific
]
ignore = [
  "E501",          # длина строки — формат сам режет
  "RUF002",        # ambiguous unicode в docstring — у нас docstring'и на русском
  "RUF003",        # то же для комментариев
  # RUF001 (string literals) НЕ отключаем — там бывают model IDs и keys, где
  # подмена `с`/`c` или `е`/`e` — реальный баг.
]

[lint.per-file-ignores]
"tests/**" = ["B011"]
"**/schemas/**" = ["RUF001"]
"**/schemas.py" = ["RUF001"]
"**/_keywords.py" = ["RUF001"]

[lint.flake8-bugbear]
# FastAPI dependency declarations intentionally call marker helpers in defaults.
# Without this, idiomatic `Depends(...)` code from M01 trips B008.
extend-immutable-calls = [
  "fastapi.Body",
  "fastapi.Cookie",
  "fastapi.Depends",
  "fastapi.File",
  "fastapi.Form",
  "fastapi.Header",
  "fastapi.Path",
  "fastapi.Query",
  "fastapi.Security",
]
